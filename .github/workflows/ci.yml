name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
        laravel: ['12', '13']
        dependencies: [prefer-stable]
        include:
          - php: '8.2'
            laravel: '12'
            dependencies: prefer-lowest
        exclude:
          - php: '8.2'
            laravel: '13'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }} (${{ matrix.dependencies }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: soap
          coverage: none

      - name: Pin the Laravel version
        run: |
          composer require --no-update --no-interaction \
            "illuminate/contracts:^${{ matrix.laravel }}.0" \
            "illuminate/support:^${{ matrix.laravel }}.0"

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --${{ matrix.dependencies }}

      - name: Run tests
        run: vendor/bin/phpunit

  static-analysis:
    runs-on: ubuntu-latest

    name: Static analysis & code style

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: soap
          coverage: none

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-stable

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run Pint
        run: vendor/bin/pint --test
